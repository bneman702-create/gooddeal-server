<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>GoodDeal? — Know before you buy.</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GoodDeal?">
<meta name="theme-color" content="#0A0A12">
<style>
:root{
  --bg:#0A0A12;
  --surface:#12121A;
  --border:#1E1E2E;
  --grad:linear-gradient(135deg,#00C2FF 0%,#7C3AED 100%);
  --green:#22C55E;
  --yellow:#EAB308;
  --red:#EF4444;
  --text:#F0F0FA;
  --muted:#6B6B8A;
  --tab-h:72px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;overflow:hidden;}
button,input{font-family:inherit;}
#app{width:100%;max-width:460px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.scroll-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab-h) + var(--safe-bottom) + 12px);}
.scroll-body::-webkit-scrollbar{display:none;}
.no-tabs .scroll-body{padding-bottom:calc(var(--safe-bottom) + 24px);}

/* ===== Floating glow (CSS only) ===== */
.glow{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.glow-a,.glow-b{position:absolute;border-radius:50%;filter:blur(90px);}
.glow-a{width:340px;height:340px;background:#00C2FF;opacity:.22;top:-90px;left:-100px;animation:floatA 16s ease-in-out infinite;}
.glow-b{width:320px;height:320px;background:#7C3AED;opacity:.22;bottom:-80px;right:-90px;animation:floatB 18s ease-in-out infinite;}
@keyframes floatA{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(40px,60px) scale(1.12);}}
@keyframes floatB{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-50px,-40px) scale(1.1);}}

/* ===== Shared buttons ===== */
.gbtn{width:100%;height:56px;border:none;border-radius:16px;background:var(--grad);color:#fff;font-size:17px;font-weight:700;letter-spacing:-.2px;cursor:pointer;box-shadow:0 10px 30px rgba(0,194,255,.25);transition:transform .12s;}
.gbtn:active{transform:scale(.97);}
.gbtn:disabled{background:var(--surface);color:var(--muted);box-shadow:none;cursor:default;}
.obtn{width:100%;height:56px;border:1px solid var(--border);border-radius:16px;background:var(--surface);color:var(--text);font-size:16px;font-weight:600;cursor:pointer;transition:transform .12s;}
.obtn:active{transform:scale(.97);}
.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}

/* ===== Onboarding scaffolding ===== */
.onb{position:relative;z-index:1;min-height:100%;display:flex;flex-direction:column;padding:calc(56px + var(--safe-top)) 24px calc(120px + var(--safe-bottom));}
.back-arrow{position:absolute;top:calc(20px + var(--safe-top));left:18px;width:40px;height:40px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;transition:transform .12s;}
.back-arrow:active{transform:scale(.92);}
.onb-title{font-size:28px;font-weight:800;letter-spacing:-.8px;margin-bottom:8px;}
.onb-sub{font-size:15px;color:var(--muted);margin-bottom:28px;}
.onb-foot{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;padding:16px 24px calc(18px + var(--safe-bottom));background:linear-gradient(to top,var(--bg) 72%,transparent);z-index:5;}
.skip{display:block;text-align:center;margin-top:14px;font-size:14px;color:var(--muted);cursor:pointer;}

/* ===== Screen 1 Welcome ===== */
.welcome{position:relative;z-index:1;min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 28px calc(40px + var(--safe-bottom));}
.welcome-spacer{flex:0 0 auto;height:8vh;}
.app-icon{width:118px;height:118px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:30px;animation:glowpulse 2.6s ease-in-out infinite;}
@keyframes glowpulse{0%,100%{box-shadow:0 0 40px rgba(0,194,255,.45),0 0 80px rgba(124,58,237,.3);transform:scale(1);}50%{box-shadow:0 0 70px rgba(0,194,255,.7),0 0 120px rgba(124,58,237,.5);transform:scale(1.04);}}
.welcome-name{font-size:52px;font-weight:900;letter-spacing:-2px;line-height:1;color:#fff;margin-bottom:14px;}
.welcome-tag{font-size:18px;color:var(--muted);margin-bottom:0;}
.welcome-cta{width:100%;max-width:360px;margin-top:6px;}
.welcome-foot{margin-top:14px;font-size:13px;color:var(--muted);}

/* ===== Screen 2 Pricing ===== */
.plan-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;cursor:pointer;transition:transform .12s;}
.plan-card:active{transform:scale(.98);}
.plan-card.sel{border-color:transparent;background:linear-gradient(var(--surface),var(--surface)) padding-box,var(--grad) border-box;border:2px solid transparent;}
.plan-card.sel::before{content:'';position:absolute;inset:0;border-radius:14px;background:var(--grad);opacity:.06;pointer-events:none;}
.plan-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;position:relative;}
.plan-label{font-size:20px;font-weight:800;letter-spacing:-.4px;display:flex;align-items:center;gap:8px;}
.plan-badge{font-size:11px;font-weight:800;color:#fff;background:var(--grad);border-radius:999px;padding:3px 10px;letter-spacing:.5px;}
.plan-price{font-size:18px;font-weight:800;}
.plan-feat{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text);margin-top:9px;position:relative;}
.plan-feat .tick{color:var(--green);font-weight:800;flex-shrink:0;}
.pro-note{font-size:13px;color:var(--yellow);margin:2px 2px 16px;text-align:center;min-height:18px;}

/* ===== Screen 3 Interests ===== */
.int-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.int-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;transition:transform .12s;}
.int-card:active{transform:scale(.97);}
.int-emoji{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;background:#0A0A12;transition:background .2s;}
.int-name{font-size:13px;font-weight:600;text-align:center;line-height:1.3;}
.int-card.sel{border-color:transparent;background:linear-gradient(var(--surface),var(--surface)) padding-box,var(--grad) border-box;border:2px solid transparent;}
.int-card.sel .int-emoji{background:var(--grad);}
.int-check{display:none;}
.int-card.sel .int-check{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}

/* ===== Top bar ===== */
.topbar{position:relative;z-index:40;padding:calc(14px + var(--safe-top)) 16px 10px;display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{font-size:18px;font-weight:800;letter-spacing:-.6px;}
.iconbtn{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:12px;min-width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;transition:transform .12s;}
.iconbtn:active{transform:scale(.92);}

/* ===== Hero ===== */
.hero{position:relative;z-index:1;padding:12px 20px 0;}
.hero h1{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1.1;}
.hero-sub{font-size:14px;color:var(--muted);margin-top:8px;}

/* ===== Form card ===== */
.form-card{position:relative;z-index:1;margin:20px 16px 0;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 18px;}
.field-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;display:block;margin:18px 0 8px;}
.field-label:first-child{margin-top:0;}
input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;color:var(--text);font-size:16px;outline:none;transition:box-shadow .2s,border-color .2s;-webkit-appearance:none;}
input:focus{border-color:#00C2FF;box-shadow:0 0 0 3px rgba(0,194,255,.18);}
input::placeholder{color:var(--muted);}
.price-wrap{position:relative;}
.price-wrap .dollar{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px;font-weight:700;color:var(--muted);pointer-events:none;}
.price-wrap input{padding-left:34px;}
.check-btn{margin-top:22px;}

.chips-row{position:relative;z-index:1;margin:16px 16px 4px;display:flex;gap:8px;flex-wrap:wrap;}
.chip{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:8px 14px;font-size:13px;color:var(--muted);cursor:pointer;transition:transform .12s,color .2s;white-space:nowrap;}
.chip:active{transform:scale(.95);color:var(--text);}

/* ===== Tab bar ===== */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;height:var(--tab-h);padding-bottom:var(--safe-bottom);background:rgba(10,10,18,.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-around;padding-top:8px;z-index:50;}
.tab-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:4px 16px;min-width:72px;transition:transform .12s;}
.tab-btn:active{transform:scale(.9);}
.tab-icon{font-size:20px;line-height:1;filter:grayscale(.6) opacity(.55);transition:filter .2s;}
.tab-btn.active .tab-icon{filter:none;}
.tab-label{font-size:10px;font-weight:600;color:var(--muted);}
.tab-btn.active .tab-label{font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.tab-dot{width:5px;height:5px;border-radius:50%;background:var(--grad);opacity:0;transition:opacity .2s;}
.tab-btn.active .tab-dot{opacity:1;}

/* ===== Loading ===== */
.loading-screen{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:24px;padding:0 32px;}
.loading-logo{width:84px;height:84px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:38px;animation:glowpulse 1.5s ease-in-out infinite;}
.loading-step{font-size:18px;font-weight:700;text-align:center;letter-spacing:-.3px;min-height:24px;}
.loading-dots{display:flex;gap:6px;}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:#00C2FF;animation:dotp 1.2s ease-in-out infinite;}
.loading-dots span:nth-child(2){animation-delay:.2s;background:#3FA0F0;}
.loading-dots span:nth-child(3){animation-delay:.4s;background:#7C3AED;}
@keyframes dotp{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}

/* ===== Result ===== */
.verdict-block{position:relative;z-index:1;text-align:center;padding:26px 24px 8px;}
.score-line{display:flex;align-items:baseline;justify-content:center;gap:6px;}
.score-num{font-size:72px;font-weight:900;letter-spacing:-3px;line-height:1;}
.score-num.grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.score-100{font-size:22px;font-weight:700;color:var(--muted);}
.verdict-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:14px;}
.verdict-emoji{font-size:34px;}
.verdict-label{font-size:24px;font-weight:800;letter-spacing:-.5px;}
.verdict-quote{font-size:16px;font-style:italic;color:var(--muted);line-height:1.45;margin-top:14px;max-width:340px;margin-left:auto;margin-right:auto;}
.verdict-warn{margin:14px 16px 0;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:12px;padding:12px 14px;font-size:13px;font-weight:600;color:var(--red);line-height:1.45;text-align:center;}

.sec-title{position:relative;z-index:1;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:24px 20px 10px;}
.card{position:relative;z-index:1;margin:0 16px;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.card-body{padding:16px 18px;font-size:15px;line-height:1.6;}
.card.coupon{border-color:rgba(0,194,255,.3);}
.card.alts{border-color:rgba(124,58,237,.3);}

.price-row{padding:14px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .1s;}
.card>.price-row:first-child{border-top:none;}
.price-row:active{background:rgba(255,255,255,.03);}
.price-row.user{background:rgba(239,68,68,.05);cursor:default;}
.price-row.best{background:rgba(34,197,94,.05);}
.store-av{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;}
.pr-info{flex:1;min-width:0;}
.pr-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pr-sub{font-size:11px;margin-top:2px;color:var(--muted);}
.pr-sub.red{color:var(--red);}
.pr-sub.green{color:var(--green);}
.pr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.pr-price{font-size:16px;font-weight:800;}
.pr-price.green{color:var(--green);}
.pr-price.red{color:var(--red);}
.badge{border-radius:999px;padding:2px 8px;font-size:10px;font-weight:800;letter-spacing:.3px;}
.badge.best{background:rgba(34,197,94,.15);color:var(--green);}
.badge.save{background:rgba(34,197,94,.15);color:var(--green);}
.badge.warn{background:rgba(239,68,68,.15);color:var(--red);}

.wob{position:relative;z-index:1;margin:0 16px;border-radius:16px;padding:18px;display:flex;align-items:flex-start;gap:14px;}
.wob.buy{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.25);}
.wob.wait{background:rgba(234,179,8,.07);border:1px solid rgba(234,179,8,.25);}
.wob-ico{font-size:26px;line-height:1;flex-shrink:0;}
.wob-t{font-size:14px;font-weight:800;margin-bottom:5px;}
.wob.buy .wob-t{color:var(--green);}
.wob.wait .wob-t{color:var(--yellow);}
.wob-x{font-size:14px;line-height:1.5;}

.action-row{position:relative;z-index:1;display:flex;gap:10px;margin:24px 16px 8px;}
.action-row button{flex:1;height:52px;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;transition:transform .12s;}
.action-row .obtn{height:52px;}
.action-row button:active{transform:scale(.97);}

/* ===== Pages ===== */
.page-head{position:relative;z-index:1;padding:8px 20px 12px;display:flex;align-items:flex-start;justify-content:space-between;}
.page-title{font-size:28px;font-weight:800;letter-spacing:-.8px;}
.page-sub{font-size:14px;color:var(--muted);margin-top:4px;}
.clear-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;}
.clear-btn:active{transform:scale(.95);}

.history-card{position:relative;z-index:1;margin:0 16px 10px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:transform .12s;}
.history-card:active{transform:scale(.98);}
.h-emoji{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.h-info{flex:1;min-width:0;}
.h-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.h-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.h-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.h-score{font-size:12px;font-weight:800;border-radius:999px;padding:3px 9px;}
.h-verdict{font-size:11px;font-weight:700;}
.empty-state{text-align:center;color:var(--muted);padding:90px 32px;font-size:15px;line-height:1.7;}
.empty-icon{font-size:48px;margin-bottom:16px;display:block;}

.cat-section-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;padding:20px 20px 8px;}
.cat-row{display:flex;align-items:center;gap:14px;padding:13px 20px;cursor:pointer;position:relative;}
.cat-row:active{background:var(--surface);}
.cat-row.selected{background:rgba(0,194,255,.07);}
.cat-row.selected::after{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;background:var(--grad);}
.cat-ico{width:36px;height:36px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.cat-name{font-size:15px;font-weight:600;}
.cat-row.selected .cat-name{font-weight:700;}
.cat-check{margin-left:auto;color:#00C2FF;font-size:16px;opacity:0;}
.cat-row.selected .cat-check{opacity:1;}

/* ===== Sidebar ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:none;backdrop-filter:blur(3px);}
.overlay.open{display:block;}
.sidebar{position:fixed;top:0;left:-320px;width:320px;height:100vh;background:var(--surface);border-right:1px solid var(--border);z-index:101;transition:left .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding-bottom:60px;}
.sidebar::-webkit-scrollbar{display:none;}
.sidebar.open{left:0;}
.sidebar-hdr{padding:calc(20px + var(--safe-top)) 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:5;}
.sidebar-title{font-size:17px;font-weight:800;}
.close-btn{background:var(--bg);border:1px solid var(--border);color:var(--muted);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;}

/* ===== Toast ===== */
.toast{position:fixed;bottom:calc(var(--tab-h) + 16px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);max-width:340px;width:calc(100% - 40px);background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;font-size:14px;color:var(--text);z-index:200;opacity:0;transition:opacity .25s,transform .25s;box-shadow:0 12px 40px rgba(0,0,0,.5);pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes fadein{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadein .35s ease forwards;}
</style>
</head>
<body>
<div class="glow"><div class="glow-a"></div><div class="glow-b"></div></div>
<div id="app"></div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-hdr">
    <span class="sidebar-title">Categories</span>
    <button class="close-btn" onclick="closeSidebar()">&#x2715;</button>
  </div>
  <div id="cat-list"></div>
</div>
<nav class="tab-bar" id="tab-bar" style="display:none">
  <button class="tab-btn" id="tab-home" onclick="switchTab('home')"><span class="tab-icon">🏠</span><span class="tab-label">Home</span><span class="tab-dot"></span></button>
  <button class="tab-btn" id="tab-history" onclick="switchTab('history')"><span class="tab-icon">🕐</span><span class="tab-label">History</span><span class="tab-dot"></span></button>
  <button class="tab-btn" id="tab-categories" onclick="switchTab('categories')"><span class="tab-icon">▦</span><span class="tab-label">Categories</span><span class="tab-dot"></span></button>
</nav>
<div class="toast" id="toast"></div>
<script>
const SERVER="https://gooddeal-server-production.up.railway.app";

const CATEGORIES=[
  {section:"Popular"},
  {id:"all",icon:"🔍",name:"Everything",tips:[],examples:[{label:"AirPods Pro 2nd Gen",price:"$189",store:"Best Buy"},{label:"Nike Air Force 1",price:"$110",store:"Foot Locker"},{label:"Instant Pot",price:"$89",store:"Target"},{label:"Levi's 501 Jeans",price:"$79",store:"Macy's"}]},
  {section:"Fashion & Style"},

function checkScam(item,price){const il=item.toLowerCase();const pN=parseFloat(String(price).replace(/[^0-9.]/g,""))||0;for(const[k,r] of Object.entries(RETAIL_PRICES)){if(il.includes(k)&&pN>0&&pN<r*0.4)return`Red flag: ${item} retails for ~$${r}. This price is suspiciously low — could be fake.`;}return null;}

function storeAvatarColor(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))&0xFFFFFF;return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length];}
function storeAvatar(name){const letter=(name||"?")[0].toUpperCase();const color=storeAvatarColor(name||"?");return`<div class="store-av" style="background:${color}22;color:${color};border:1px solid ${color}33">${letter}</div>`;}

const CATS=CATEGORIES.filter(c=>c.id);
function getCat(){return CATS.find(c=>c.id===state.categoryId)||CATS[0];}
function scoreToVerdict(s){return s>=78?"great":s>=55?"good":s>=33?"okay":"bad";}
function pick(t,l){if(!t)return null;const m=t.match(new RegExp(l+":\\s*([\\s\\S]+?)(?=\\n[A-Z _]+:|$)","i"));return m?m[1].trim():null;}
function setState(u){Object.assign(state,u);render();}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function jsStr(s){return String(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'");}

let _toastTimer=null;
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>t.classList.remove("show"),3200);}

function openSidebar(){document.getElementById("sidebar").classList.add("open");document.getElementById("overlay").classList.add("open");}
function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("overlay").classList.remove("open");}
function selectCategory(id){state.categoryId=id;state.item="";state.price="";state.store="";saveCat(id);closeSidebar();render();}
function switchTab(tab){if(tab===state.tab&&tab!=="home")return;setState({tab,result:tab==="home"&&state.tab!=="result"?null:state.result});}

/* ===== Onboarding ===== */
function onbNext(step){setState({onbStep:step});}
function selectPlan(p){state.plan=p;try{localStorage.setItem("gd_plan",p);}catch{}render();if(p==="pro")toast("Payment coming soon — enjoy Pro free for now!");}
function continuePricing(){try{localStorage.setItem("gd_plan",state.plan);}catch{}setState({onbStep:3});}
function skipPricing(){state.plan="free";try{localStorage.setItem("gd_plan","free");}catch{}setState({onbStep:3});}
function selectInterest(id){setState({interest:id});}
function finishOnboarding(){
  if(!state.interest)return;
  try{localStorage.setItem("gd_interest",state.interest);localStorage.setItem("gd_onboarded","1");}catch{}
  setState({phase:"app",tab:"home"});
}

function buildSidebar(){
  const list=document.getElementById("cat-list");if(!list)return;
  list.innerHTML=CATEGORIES.map(c=>c.section
    ?`<div class="cat-section-label">${c.section}</div>`
    :`<div class="cat-row ${state.categoryId===c.id?"selected":""}" onclick="selectCategory('${c.id}')"><div class="cat-ico">${c.icon}</div><span class="cat-name">${c.name}</span><span class="cat-check">&#x2713;</span></div>`
  ).join("");
}

function updateTabBar(){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  const activeTab=state.tab==="result"?"home":state.tab;
  const btn=document.getElementById("tab-"+activeTab);
  if(btn)btn.classList.add("active");
}

async function analyze(){
  if(!state.item||!state.price)return;
  const cat=getCat();
  setState({loading:true,tab:"result",result:null,loadStep:"Scanning prices..."});
  startLoadCycle();
  let priceList=[],lowestPrice=null,lowestSource=null,priceDiff=null;
  try{
    const res=await fetch(`${SERVER}/prices?q=${encodeURIComponent(state.item)}`);
    const data=await res.json();
    if(Array.isArray(data)&&data.length>0){
      priceList=data.filter(r=>r.price).slice(0,8).map(r=>({price:r.price,source:r.source||"Unknown",link:r.link||null,priceNum:parseFloat(String(r.price).replace(/[^0-9.]/g,""))||999999})).sort((a,b)=>a.priceNum-b.priceNum);
      if(priceList.length>0){lowestPrice=priceList[0].price;lowestSource=priceList[0].source;const uN=parseFloat(state.price.replace(/[^0-9.]/g,""))||0;if(uN>priceList[0].priceNum)priceDiff=((uN-priceList[0].priceNum)/uN*100).toFixed(0);}
    }
  }catch(e){}
  const uN=parseFloat(state.price.replace(/[^0-9.]/g,""))||0;
  const ctx=priceList.length>0?`LIVE PRICES:\n${priceList.slice(0,6).map(r=>`- ${r.source}: ${r.price}`).join("\n")}\nLowest: ${lowestPrice} at ${lowestSource}${priceDiff?`\nOverpaying by: ${priceDiff}%`:""}`:"No live data.";
  const isAuthenticity=["sneakers","clothing","bags","jewelry","watches","sunglasses"].includes(cat.id);
  const prompt=`CATEGORY: ${cat.icon} ${cat.name}\nITEM: ${state.item}\nPRICE: ${state.price}\nSTORE: ${state.store||"not specified"}\n\n${ctx}\n\nRespond EXACTLY in this format (no extra text):\n\nSCORE: [0-100]\n\nONE LINE: [one punchy honest sentence, max 12 words]\n\nPRICE HISTORY: [2-3 sentences: typical price range, when it goes on sale, if this is high/low/average]\n${isAuthenticity?"AUTHENTICITY: [1-2 sentences: is this price suspicious for this brand? red flags for fakes?]\n":""}\nCOUPON TIPS: [specific coupon codes, cashback apps, or discount tricks that work for this item/store. Be specific, not generic.]\n\nALTERNATIVES: [2-3 specific cheaper or better alternatives with approximate prices]\n\nWAIT OR BUY: [Start with BUY NOW or WAIT — give a specific concrete reason]\n\nBOTTOM LINE: [2 sentences max, direct action advice]`;
  try{
    const r=await fetch(`${SERVER}/analyze`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt})});
    const d=await r.json();const text=d.text||"";
    const sm=text.match(/SCORE:\s*(\d+)/i);
    const score=sm?Math.min(100,Math.max(0,parseInt(sm[1]))):50;
    const scamWarn=checkScam(state.item,state.price);
    const nr={item:state.item,price:state.price,store:state.store,categoryId:state.categoryId,verdictKey:scoreToVerdict(score),score,text,priceList,lowestPrice,lowestSource,priceDiff,scamWarn,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};
    state.history=[nr,...state.history.slice(0,19)];saveHistory(state.history);stopLoadCycle();setState({loading:false,result:nr});
  }catch(e){
    const lN=priceList[0]?.priceNum||uN;
    const as=Math.max(0,Math.min(100,Math.round(100-((uN-lN)/Math.max(uN,1))*150)));
    const scamWarn=checkScam(state.item,state.price);
    const nr={item:state.item,price:state.price,store:state.store,categoryId:state.categoryId,verdictKey:scoreToVerdict(as),score:as,text:"",priceList,lowestPrice,lowestSource,priceDiff,scamWarn,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};
    state.history=[nr,...state.history.slice(0,19)];saveHistory(state.history);stopLoadCycle();setState({loading:false,result:nr});
  }
}

const LOAD_STEPS=["Scanning prices...","Checking Amazon...","Comparing stores...","Running AI..."];
let _loadTimer=null,_loadIdx=0;
function startLoadCycle(){_loadIdx=0;clearInterval(_loadTimer);_loadTimer=setInterval(()=>{_loadIdx=(_loadIdx+1)%LOAD_STEPS.length;const el=document.querySelector(".loading-step");if(el)el.textContent=LOAD_STEPS[_loadIdx];},1100);}
function stopLoadCycle(){clearInterval(_loadTimer);_loadTimer=null;}

function renderResult(){
  const r=state.result;if(!r)return"";
  const v=r.verdictKey;const vd=VERDICT[v];const sc=r.score;const tx=r.text;
  const oneLine=pick(tx,"ONE LINE");const hist=pick(tx,"PRICE HISTORY");
  const auth=pick(tx,"AUTHENTICITY");const wob=pick(tx,"WAIT OR BUY");const bottom=pick(tx,"BOTTOM LINE");
  const coupons=pick(tx,"COUPON TIPS");const alts=pick(tx,"ALTERNATIVES");
  const isWait=wob?.toLowerCase().startsWith("wait");
  const pl=r.priceList||[];const uN=parseFloat((r.price||"").replace(/[^0-9.]/g,""))||0;
  const good=(v==="great"||v==="good");
  const seen=new Set();
  const deduped=pl.filter(p=>{const k=p.source.toLowerCase();if(seen.has(k))return false;seen.add(k);return true;});

  let priceTableHtml="";
  if(deduped.length>0){
    const userRow=`<div class="price-row user">${storeAvatar(r.store||"You")}<div class="pr-info"><div class="pr-name" style="color:#EF4444">${esc(r.store||"Your store")}</div><div class="pr-sub red">Your price</div></div><div class="pr-right"><span class="pr-price red">${esc(r.price)}</span></div></div>`;
    const rows=deduped.slice(0,7).map((p,i)=>{
      const isLowest=i===0;
      const sv=uN&&p.priceNum&&uN>p.priceNum?`SAVE $${(uN-p.priceNum).toFixed(0)}`:null;
      const isSus=uN>0&&p.priceNum<uN*0.3&&uN>50;
      const buyUrl=p.link||getStoreUrl(p.source,r.item);
      return`<div class="price-row ${isLowest?"best":""}" onclick="window.open('${jsStr(buyUrl)}','_blank')">${storeAvatar(p.source)}<div class="pr-info"><div class="pr-name">${esc(p.source)}</div>${isLowest?'<div class="pr-sub green">Cheapest found</div>':'<div class="pr-sub">Tap to open &#x2192;</div>'}</div><div class="pr-right">${isSus?'<span class="badge warn">CHECK</span>':isLowest?'<span class="badge best">BEST</span>':sv?`<span class="badge save">${sv}</span>`:""}<span class="pr-price ${isLowest?"green":""}">${esc(p.price)}</span></div></div>`;
    }).join("");
    priceTableHtml=`<div class="sec-title">Live Prices</div><div class="card fade-in">${userRow}${rows}</div>`;
  }

  return`
    <div class="verdict-block fade-in">
      <div class="score-line"><span class="score-num ${good?"grad":""}" style="${good?"":`color:${vd.color}`}">${sc}</span><span class="score-100">/100</span></div>
      <div class="verdict-row"><span class="verdict-emoji">${vd.emoji}</span><span class="verdict-label ${good?"grad":""}" style="${good?"":`color:${vd.color}`}">${vd.label}</span></div>
      ${oneLine?`<div class="verdict-quote">"${esc(oneLine)}"</div>`:""}
    </div>
    ${r.scamWarn?`<div class="verdict-warn">&#x26A0;&#xFE0F; ${esc(r.scamWarn)}</div>`:""}
    ${priceTableHtml}
    ${coupons?`<div class="sec-title">Coupon Tips</div><div class="card coupon fade-in"><div class="card-body">${esc(coupons)}</div></div>`:""}
    ${alts?`<div class="sec-title">Alternatives</div><div class="card alts fade-in"><div class="card-body">${esc(alts)}</div></div>`:""}
    ${auth?`<div class="sec-title">Authenticity</div><div class="card fade-in" style="border-color:rgba(234,179,8,.3)"><div class="card-body">${esc(auth)}</div></div>`:""}
    ${hist?`<div class="sec-title">Price History</div><div class="card fade-in"><div class="card-body">${esc(hist)}</div></div>`:""}
    ${wob?`<div class="sec-title">${isWait?"Should you wait?":"Should you buy?"}</div><div class="wob ${isWait?"wait":"buy"} fade-in"><span class="wob-ico">${isWait?"⏳":"🛒"}</span><div><div class="wob-t">${isWait?"Wait":"Buy Now"}</div><div class="wob-x">${esc(wob)}</div></div></div>`:""}
    ${bottom?`<div class="sec-title">Bottom Line</div><div class="card fade-in"><div class="card-body">${esc(bottom)}</div></div>`:""}
    <div class="action-row fade-in">
      <button class="obtn" onclick="doReset()">Check Another</button>
      <button class="gbtn" style="height:52px" onclick="doShare()">Share</button>
    </div>
    <div style="height:8px"></div>`;
}

function quickPickChips(){
  const c=CATS.find(x=>x.id===state.interest)||getCat();
  const tips=(c&&c.tips&&c.tips.length)?c.tips:CATS.find(x=>x.id==="all").examples.map(e=>e.label);
  return tips.slice(0,8);
}

function renderHome(){
  const cat=CATS.find(c=>c.id===state.interest)||getCat();
  const picks=quickPickChips();
  const placeholder=cat.examples&&cat.examples[0]?cat.examples[0].label:"What are you buying?";
  const on=state.item&&state.price;
  return`
    <div class="hero">
      <h1>Is this a <span class="grad-text">good deal?</span></h1>
      <div class="hero-sub">Instant AI verdict · Live prices</div>
    </div>
    <div class="form-card">
      <label class="field-label">What are you looking for?</label>
      <input type="text" id="ii" placeholder="${esc(placeholder)}" value="${esc(state.item)}" oninput="state.item=this.value;upd()" autocomplete="off">
      <label class="field-label">Price</label>
      <div class="price-wrap"><span class="dollar">$</span><input id="ip" type="text" inputmode="decimal" placeholder="0.00" value="${esc(state.price.replace(/[$]/g,""))}" oninput="state.price=this.value?'$'+this.value.replace(/[^0-9.,]/g,''):'';upd()"></div>
      <label class="field-label">Store (optional)</label>
      <input type="text" placeholder="Where are you shopping?" value="${esc(state.store)}" oninput="state.store=this.value">
      <button id="gb" class="gbtn check-btn" ${on?"":"disabled"} onclick="if(state.item&&state.price)analyze()">Check the Deal &#x2192;</button>
    </div>
    ${picks.length>0?`<div class="chips-row">${picks.map(t=>`<button class="chip" onclick="fillItem('${jsStr(t)}')">${esc(t)}</button>`).join("")}</div>`:""}
    <div style="height:8px"></div>`;
}

function renderHistory(){
  const hc=state.history.length;
  return`
    <div class="page-head">
      <div><div class="page-title">History</div><div class="page-sub">${hc} check${hc!==1?"s":""}</div></div>
      ${hc>0?`<button class="clear-btn" onclick="clearHistory()">Clear all</button>`:""}
    </div>
    ${hc===0?`<div class="empty-state"><span class="empty-icon">&#x1F6CD;&#xFE0F;</span>No checks yet.<br>Start checking deals!</div>`:
      state.history.map((h,i)=>{const vd=VERDICT[h.verdictKey];const cat=CATS.find(c=>c.id===h.categoryId)||CATS[0];return`<div class="history-card" onclick="viewH(${i})"><div class="h-emoji" style="background:${vd.color}1A;border:1px solid ${vd.color}33">${vd.emoji}</div><div class="h-info"><div class="h-name">${cat.icon} ${esc(h.item)}</div><div class="h-meta">${esc(h.price)}${h.store?` · ${esc(h.store)}`:""} · ${esc(h.time)}</div></div><div class="h-right"><span class="h-score" style="background:${vd.color}1A;color:${vd.color}">${h.score}</span><span class="h-verdict" style="color:${vd.color}">${vd.label}</span></div></div>`;}).join("")
    }
    <div style="height:8px"></div>`;
}

function renderCategories(){
  return`
    <div class="page-head"><div><div class="page-title">Categories</div><div class="page-sub">Pick a shopping category</div></div></div>
    ${CATEGORIES.map(c=>c.section
      ?`<div class="cat-section-label">${c.section}</div>`
      :`<div class="cat-row ${state.categoryId===c.id?"selected":""}" onclick="selectCatPage('${c.id}')"><div class="cat-ico">${c.icon}</div><span class="cat-name">${c.name}</span><span class="cat-check">&#x2713;</span></div>`
    ).join("")}
    <div style="height:8px"></div>`;
}
function selectCatPage(id){state.categoryId=id;state.item="";state.price="";state.store="";saveCat(id);setState({tab:"home"});}

/* ===== Onboarding screens ===== */
function renderWelcome(){
  return`<div class="welcome">
    <div class="welcome-spacer"></div>
    <div class="app-icon">🔍</div>
    <div class="welcome-name">GoodDeal?</div>
    <div class="welcome-tag">Know before you buy.</div>
    <div class="welcome-spacer"></div>
    <button class="gbtn welcome-cta" onclick="onbNext(2)">Get Started</button>
    <div class="welcome-foot">Free to use · No account needed</div>
  </div>`;
}

function renderPricing(){
  const sel=state.plan;
  return`<div class="onb">
    <div class="back-arrow" onclick="onbNext(1)">&#x2190;</div>
    <div class="onb-title">Choose your plan</div>
    <div class="onb-sub">Start free, upgrade anytime</div>
    <div class="plan-card ${sel==="free"?"sel":""}" onclick="selectPlan('free')">
      <div class="plan-head"><span class="plan-label">Free</span><span class="plan-price">$0</span></div>
      <div class="plan-feat"><span class="tick">&#x2713;</span>5 checks per day</div>
      <div class="plan-feat"><span class="tick">&#x2713;</span>AI price analysis</div>
      <div class="plan-feat"><span class="tick">&#x2713;</span>Live prices from Amazon, eBay &amp; more</div>
    </div>
    <div class="plan-card ${sel==="pro"?"sel":""}" onclick="selectPlan('pro')">
      <div class="plan-head"><span class="plan-label">Pro <span class="plan-badge">PRO</span></span><span class="plan-price">$1.99/mo</span></div>
      <div class="plan-feat"><span class="tick">&#x2713;</span>Unlimited checks</div>
      <div class="plan-feat"><span class="tick">&#x2713;</span>Priority AI analysis</div>
      <div class="plan-feat"><span class="tick">&#x2713;</span>Coupon codes &amp; alternatives</div>
      <div class="plan-feat"><span class="tick">&#x2713;</span>Early access to new features</div>
    </div>
  </div>
  <div class="onb-foot">
    <div class="pro-note">${sel==="pro"?"Payment coming soon — enjoy Pro free for now!":""}</div>
    <button class="gbtn" onclick="continuePricing()">Continue &#x2192;</button>
    <span class="skip" onclick="skipPricing()">Skip for now</span>
  </div>`;
}

function renderInterests(){
  const sel=state.interest;
  return`<div class="onb">
    <div class="back-arrow" onclick="onbNext(2)">&#x2190;</div>
    <div class="onb-title">What do you shop for?</div>
    <div class="onb-sub">Pick one to personalize your feed</div>
    <div class="int-grid">
      ${INTEREST_CATS.map(c=>`<div class="int-card ${sel===c.id?"sel":""}" onclick="selectInterest('${c.id}')"><span class="int-check">&#x2713;</span><span class="int-emoji">${c.icon}</span><span class="int-name">${c.name}</span></div>`).join("")}
    </div>
  </div>
  <div class="onb-foot">
    <button class="gbtn" ${sel?"":"disabled"} onclick="finishOnboarding()">Let's Go &#x2192;</button>
  </div>`;
}

function render(){
  const app=document.getElementById("app");
  const tabBar=document.getElementById("tab-bar");

  if(state.phase!=="app"){
    app.className="no-tabs";tabBar.style.display="none";
    let body=state.onbStep===1?renderWelcome():state.onbStep===2?renderPricing():renderInterests();
    app.innerHTML=`<div class="scroll-body">${body}</div>`;
    return;
  }

  app.className="";tabBar.style.display="flex";

  let body="";
  if(state.tab==="result"){
    body=state.loading
      ?`<div class="loading-screen"><div class="loading-logo">🔍</div><div class="loading-step">${esc(state.loadStep)}</div><div class="loading-dots"><span></span><span></span><span></span></div></div>`
      :renderResult();
  }else if(state.tab==="history"){body=renderHistory();}
  else if(state.tab==="categories"){body=renderCategories();}
  else{body=renderHome();}

  const isResult=state.tab==="result";
  const right=isResult?`<button class="iconbtn" onclick="doReset()">&#x2190;</button>`:`<button class="iconbtn" onclick="switchTab('history')">🕐</button>`;
  app.innerHTML=`
    <div class="topbar">
      <button class="iconbtn" onclick="openSidebar()">☰</button>
      <div class="topbar-logo grad-text">GoodDeal?</div>
      ${right}
    </div>
    <div class="scroll-body">${body}</div>`;

  updateTabBar();
  buildSidebar();
}

function fillItem(val){state.item=val;const ii=document.getElementById("ii");if(ii)ii.value=val;upd();const ip=document.getElementById("ip");if(ip)ip.focus();}
function doReset(){setState({tab:"home",result:null,item:"",price:"",store:""});}
function viewH(i){const h=state.history[i];state.item=h.item;state.price=h.price;state.store=h.store;state.categoryId=h.categoryId||"all";setState({tab:"result",result:h});}
function upd(){const b=document.getElementById("gb");if(!b)return;b.disabled=!(state.item&&state.price);}
function clearHistory(){state.history=[];saveHistory([]);render();}
function doShare(){
  const r=state.result;if(!r)return;
  const vd=VERDICT[r.verdictKey];const ol=pick(r.text,"ONE LINE");
  const ch=r.priceList?.[0]?`\nCheapest: ${r.priceList[0].source} at ${r.priceList[0].price}`:"";
  const coupons=pick(r.text,"COUPON TIPS");
  const t=`${vd.emoji} ${r.item} for ${r.price} — ${vd.label} (${r.score}/100)${ch}${ol?`\n\n"${ol}"`:""}${coupons?`\n\nCoupon tip: ${coupons.split(".")[0]}.`:""}\n\nChecked with GoodDeal?`;
  if(navigator.share){navigator.share({text:t}).catch(()=>{});}
  else navigator.clipboard?.writeText(t).then(()=>toast("Copied to clipboard!")).catch(()=>toast(t));
}

render();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
