function getStoreUrl(source,item){const s=source.toLowerCase();const match=Object.keys(STORE_URLS).find(k=>s.includes(k));return(match?STORE_URLS[match]:"https://www.amazon.com/s?k=")+encodeURIComponent(item);}

const RETAIL_PRICES={"jordan":150,"yeezy":220,"air force":110,"dunk":110,"louis vuitton":800,"gucci":500,"chanel":1000,"rolex":5000,"iphone":799,"airpods pro":189,"ps5":499};
function checkScam(item,price){const il=item.toLowerCase();const pN=parseFloat(String(price).replace(/[^0-9.]/g,""))||0;for(const[k,r] of Object.entries(RETAIL_PRICES)){if(il.includes(k)&&pN>0&&pN<r*0.4)return`Red flag: ${item} retails for ~$${r}. This price is suspiciously low — could be fake.`;}return null;}

const AVATAR_COLORS=["#6366F1","#8B5CF6","#EC4899","#EF4444","#F97316","#EAB308","#22C55E","#14B8A6","#06B6D4","#3B82F6"];
function storeAvatarColor(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))&0xFFFFFF;return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length];}
function storeAvatar(name){const letter=(name||"?")[0].toUpperCase();const color=storeAvatarColor(name);return`<div class="store-avatar" style="background:${color}22;color:${color};border:1px solid ${color}33">${letter}</div>`;}

function loadHistory(){try{return JSON.parse(localStorage.getItem("gd_history")||"[]")}catch{return[]}}
function saveHistory(h){try{localStorage.setItem("gd_history",JSON.stringify(h.slice(0,20)))}catch{}}
function loadCat(){try{return localStorage.getItem("gd_cat")||"all"}catch{return"all"}}
function saveCat(id){try{localStorage.setItem("gd_cat",id)}catch{}}

let state={tab:"home",item:"",price:"",store:"",size:"",loading:false,loadStep:"",result:null,history:loadHistory(),categoryId:loadCat(),installBannerDismissed:!!localStorage.getItem("gd_nobanner"),_prevTab:"home"};

const CATS=CATEGORIES.filter(c=>c.id);
function getCat(){return CATS.find(c=>c.id===state.categoryId)||CATS[0];}
function scoreToVerdict(s){return s>=78?"great":s>=55?"good":s>=33?"okay":"bad";}
function pick(t,l){if(!t)return null;const m=t.match(new RegExp(l+":\\s*([\\s\\S]+?)(?=\\n[A-Z _]+:|$)","i"));return m?m[1].trim():null;}
function setState(u){Object.assign(state,u);render();}

function openSidebar(){document.getElementById("sidebar").classList.add("open");document.getElementById("overlay").classList.add("open");}
function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("overlay").classList.remove("open");}
function selectCategory(id){state.categoryId=id;state.item="";state.price="";state.store="";state.size="";saveCat(id);closeSidebar();render();}
function switchTab(tab){if(tab===state.tab&&tab!=="home")return;setState({tab,result:tab==="home"&&state.tab!=="result"?null:state.result});}
function dismissBanner(){state.installBannerDismissed=true;try{localStorage.setItem("gd_nobanner","1");}catch{}render();}

function buildSidebar(){
  const list=document.getElementById("cat-list");if(!list)return;
  list.innerHTML=CATEGORIES.map(c=>c.section
    ?`<div class="cat-section-label">${c.section}</div>`
    :`<div class="cat-row ${state.categoryId===c.id?"selected":""}" onclick="selectCategory('${c.id}')"><div class="cat-icon-wrap">${c.icon}</div><span class="cat-name">${c.name}</span><span class="cat-check">&#x2713;</span></div>`
  ).join("");
}

function updateTabBar(){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  const activeTab=state.tab==="result"?"home":state.tab;
  const btn=document.getElementById("tab-"+activeTab);
  if(btn)btn.classList.add("active");
}

async function analyze(){
  if(!state.item||!state.price)return;
  const cat=getCat();
  setState({loading:true,tab:"result",result:null,loadStep:"Searching live prices..."});
  let priceList=[],lowestPrice=null,lowestSource=null,priceDiff=null;
  try{
    const q=state.item+(state.size?` size ${state.size}`:"");
    const res=await fetch(`${SERVER}/prices?q=${encodeURIComponent(q)}`);
    const data=await res.json();
    if(Array.isArray(data)&&data.length>0){
      priceList=data.filter(r=>r.price).slice(0,8).map(r=>({price:r.price,source:r.source||"Unknown",link:r.link||null,priceNum:parseFloat(String(r.price).replace(/[^0-9.]/g,""))||999999})).sort((a,b)=>a.priceNum-b.priceNum);
      if(priceList.length>0){lowestPrice=priceList[0].price;lowestSource=priceList[0].source;const uN=parseFloat(state.price.replace(/[^0-9.]/g,""))||0;if(uN>priceList[0].priceNum)priceDiff=((uN-priceList[0].priceNum)/uN*100).toFixed(0);}
    }
  }catch(e){}
  setState({loadStep:"Running AI analysis..."});
  const uN=parseFloat(state.price.replace(/[^0-9.]/g,""))||0;
  const ctx=priceList.length>0?`LIVE PRICES:\n${priceList.slice(0,6).map(r=>`- ${r.source}: ${r.price}`).join("\n")}\nLowest: ${lowestPrice} at ${lowestSource}${priceDiff?`\nOverpaying by: ${priceDiff}%`:""}`:"No live data.";
  const isAuthenticity=["sneakers","clothing","bags","jewelry","watches","sunglasses"].includes(cat.id);
  const prompt=`CATEGORY: ${cat.icon} ${cat.name}\nITEM: ${state.item}${state.size?` (Size: ${state.size})`:""}\nPRICE: ${state.price}\nSTORE: ${state.store||"not specified"}\n\n${ctx}\n\nRespond EXACTLY in this format (no extra text):\n\nSCORE: [0-100]\n\nONE LINE: [one punchy honest sentence, max 12 words]\n\nPRICE HISTORY: [2-3 sentences: typical price range, when it goes on sale, if this is high/low/average]\n${isAuthenticity?"AUTHENTICITY: [1-2 sentences: is this price suspicious for this brand? red flags for fakes?]\n":""}\nCOUPON TIPS: [specific coupon codes, cashback apps, or discount tricks that work for this item/store. Be specific, not generic.]\n\nALTERNATIVES: [2-3 specific cheaper or better alternatives with approximate prices]\n\nWAIT OR BUY: [Start with BUY NOW or WAIT — give a specific concrete reason]\n\nBOTTOM LINE: [2 sentences max, direct action advice]`;
  try{
    const r=await fetch(`${SERVER}/analyze`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt})});
    const d=await r.json();const text=d.text||"";
    const sm=text.match(/SCORE:\s*(\d+)/i);
    const score=sm?Math.min(100,Math.max(0,parseInt(sm[1]))):50;
    const scamWarn=checkScam(state.item,state.price);
    const nr={item:state.item,price:state.price,store:state.store,size:state.size,categoryId:state.categoryId,verdictKey:scoreToVerdict(score),score,text,priceList,lowestPrice,lowestSource,priceDiff,scamWarn,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};
    state.history=[nr,...state.history.slice(0,19)];saveHistory(state.history);setState({loading:false,result:nr});
  }catch(e){
    const lN=priceList[0]?.priceNum||uN;
    const as=Math.max(0,Math.min(100,Math.round(100-((uN-lN)/Math.max(uN,1))*150)));
    const scamWarn=checkScam(state.item,state.price);
    const nr={item:state.item,price:state.price,store:state.store,size:state.size,categoryId:state.categoryId,verdictKey:scoreToVerdict(as),score:as,text:"",priceList,lowestPrice,lowestSource,priceDiff,scamWarn,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};
    state.history=[nr,...state.history.slice(0,19)];saveHistory(state.history);setState({loading:false,result:nr});
  }
}

function buildScoreRing(score,color){
  const r=46,circ=2*Math.PI*r,dash=(score/100)*circ;
  return`<div class="score-ring"><svg viewBox="0 0 110 110"><circle class="score-ring-track" cx="55" cy="55" r="${r}"/><circle class="score-ring-fill" cx="55" cy="55" r="${r}" stroke="${color}" stroke-dasharray="${dash} ${circ}" stroke-dashoffset="0"/></svg><div class="score-ring-center"><span class="score-num" style="color:${color}">${score}</span><span class="score-label">SCORE</span></div></div>`;
}

function renderResult(){
  const r=state.result;if(!r)return"";
  const v=r.verdictKey;const vd=VERDICT[v];const sc=r.score;const tx=r.text;
  const oneLine=pick(tx,"ONE LINE");const hist=pick(tx,"PRICE HISTORY");
  const auth=pick(tx,"AUTHENTICITY");const wob=pick(tx,"WAIT OR BUY");const bottom=pick(tx,"BOTTOM LINE");
  const coupons=pick(tx,"COUPON TIPS");const alts=pick(tx,"ALTERNATIVES");
  const isWait=wob?.toLowerCase().startsWith("wait");
  const pl=r.priceList||[];const uN=parseFloat((r.price||"").replace(/[^0-9.]/g,""))||0;
  const cat=CATS.find(c=>c.id===r.categoryId)||CATS[0];
  if(state.loading){return`<div class="loading-screen"><div class="loading-logo">🔍</div><div class="loading-item">${r.item||state.item}</div><div class="loading-step">${state.loadStep}</div><div class="loading-dots"><span></span><span></span><span></span></div></div>`;}
  const seen=new Set();
  const deduped=pl.filter(p=>{const k=p.source.toLowerCase();if(seen.has(k))return false;seen.add(k);return true;});
  let priceTableHtml="";
  if(deduped.length>0){
    const userRow=`<div class="price-row user-row">${storeAvatar(r.store||"You")}<div class="price-row-info"><div class="store-name" style="color:#F87171">${r.store||"Your Store"}</div><div class="store-sub red">Where you're standing</div></div><div class="price-row-right"><span class="row-price red">${r.price}</span></div></div>`;
    const rows=deduped.slice(0,7).map((p,i)=>{
      const isLowest=i===0;const sv=uN&&p.priceNum&&uN>p.priceNum?`Save $${(uN-p.priceNum).toFixed(0)}`:null;const isSus=uN>0&&p.priceNum<uN*0.3&&uN>50;
      const buyUrl=p.link||getStoreUrl(p.source,r.item+(r.size?` ${r.size}`:""));
      return`<div class="price-row ${isLowest?"lowest-row":""}" onclick="window.open('${buyUrl}','_blank')">${storeAvatar(p.source)}<div class="price-row-info"><div class="store-name">${isLowest?"🏆 ":""}${p.source}</div>${isLowest?'<div class="store-sub green">Cheapest found</div>':isSus?'<div class="store-sub red">Verify authenticity</div>':'<div class="store-sub accent">Tap to buy &#x2192;</div>'}</div><div class="price-row-right">${isSus?'<span class="warn-tag">Suspicious</span>':sv?`<span class="save-tag">${sv}</span>`:""}<span class="row-price ${isLowest?"green":""}">${p.price}</span></div></div>`;
    }).join("");
    priceTableHtml=`<div class="price-table fade-in"><div class="price-table-hdr"><span class="price-table-title">${cat.icon} Live Prices</span><span class="live-badge"><span class="live-dot"></span>Live</span></div>${userRow}${rows}</div>`;
  }
  return`
    <div class="verdict-card fade-in" style="background:${vd.bg};border:1px solid ${vd.border}">
      <div class="vc-cat" style="color:${vd.color}">${cat.icon} ${cat.name}</div>
      <div class="score-ring-wrap">${buildScoreRing(sc,vd.color)}</div>
      <div class="verdict-emoji">${vd.emoji}</div>
      <div class="verdict-title" style="color:${vd.color}">${vd.label}</div>
      <div class="verdict-meta">${r.item}${r.size?` · ${r.size}`:""}<br>${r.price}${r.store?` at ${r.store}`:""}</div>
      ${r.priceDiff&&parseInt(r.priceDiff)>5?`<div class="verdict-save">Save ${r.priceDiff}% buying elsewhere</div>`:""}
      ${r.scamWarn?`<div class="verdict-warn">&#x26A0;&#xFE0F; ${r.scamWarn}</div>`:""}
    </div>
    ${oneLine?`<div class="result-sec fade-in"><div class="result-sec-title">The Verdict</div><p class="one-line-quote">"${oneLine}"</p></div>`:""}
    ${priceTableHtml}
    ${auth?`<div class="result-sec fade-in" style="border-color:rgba(250,204,21,0.2)"><div class="result-sec-title">&#x1F50D; Authenticity</div><p class="result-sec-body">${auth}</p></div>`:""}
    ${hist?`<div class="result-sec fade-in"><div class="result-sec-title">&#x1F4C8; Price History</div><p class="result-sec-body">${hist}</p></div>`:""}
    ${coupons?`<div class="result-sec fade-in" style="border-color:rgba(99,102,241,0.25)"><div class="result-sec-title">&#x1F3F7;&#xFE0F; Coupon Tips</div><p class="result-sec-body">${coupons}</p></div>`:""}
    ${alts?`<div class="result-sec fade-in" style="border-color:rgba(129,140,248,0.2)"><div class="result-sec-title">&#x1F4A1; Alternatives</div><p class="result-sec-body">${alts}</p></div>`:""}
    ${wob?`<div class="wob-card fade-in ${isWait?"wait-card":"buy-card"}"><span class="wob-icon">${isWait?"⏳":"🛒"}</span><div><div class="wob-title">${isWait?"Wait":"Buy Now"}</div><div class="wob-text">${wob}</div></div></div>`:""}
    ${bottom?`<div class="result-sec fade-in" style="border-color:${vd.border}"><div class="result-sec-title">Bottom Line</div><p class="result-sec-body">${bottom}</p></div>`:""}
    <div class="action-row fade-in">
      <button class="primary-btn" onclick="doReset()">Check Another</button>
      <button class="secondary-btn" onclick="doShare()">Share &#x1F4CB;</button>
    </div>
    <div style="height:8px"></div>`;
}

function renderHome(){
  const cat=getCat();
  const needsSize=["sneakers","clothing","bags","kids_clothing"].includes(cat.id);
  const recentItems=[...new Set(state.history.map(h=>h.item))].slice(0,5);
  const acItems=state.item?recentItems.filter(i=>i.toLowerCase().includes(state.item.toLowerCase())&&i!==state.item):[];
  const acHtml=acItems.length>0?`<div class="ac-drop">${acItems.map(i=>`<div class="ac-item" onclick="fillItem('${i.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">&#x1F550; ${i}<span class="ac-sub">recent</span></div>`).join("")}</div>`:"";
  const showBanner=!state.installBannerDismissed&&typeof navigator!=="undefined"&&navigator.standalone===false&&/iPhone|iPad/.test(navigator.userAgent);
  return`
    ${showBanner?`<div class="install-banner"><span class="install-icon">&#x1F4F2;</span><div class="install-text"><div class="install-title">Add to Home Screen</div><div class="install-sub">Tap Share then "Add to Home Screen"</div></div><button class="install-close" onclick="dismissBanner()">&#x2715;</button></div>`:""}
    <div class="hero">
      <div class="cat-pill">${cat.icon} ${cat.name}</div>
      <h1>Is this a<br>good deal?</h1>
      <p class="hero-sub">Live prices · Scam detection · AI verdict</p>
    </div>
    <div class="form-card">
      <label class="field-label" style="margin-top:0">What is it?</label>
      <div class="input-wrap">
        <input type="text" id="ii" placeholder="${cat.examples[0]?.label||"Item name"}" value="${state.item.replace(/"/g,"&quot;")}" oninput="state.item=this.value;upd();renderAc()" autocomplete="off">
        ${acHtml}
      </div>
      ${needsSize?`<label class="field-label">Size (optional)</label><input type="text" placeholder="${cat.id==="sneakers"?"e.g. 10.5 Men's":"e.g. Large / 32x30"}" value="${state.size.replace(/"/g,"&quot;")}" oninput="state.size=this.value">`:""}
      <label class="field-label">Price you see</label>
      <input class="price-input" type="text" id="ip" inputmode="decimal" placeholder="$99" value="${state.price.replace(/"/g,"&quot;")}" oninput="state.price=this.value;upd()">
      <label class="field-label">Store (optional)</label>
      <input type="text" placeholder="Where are you shopping?" value="${state.store.replace(/"/g,"&quot;")}" oninput="state.store=this.value">
      <button id="gb" class="${state.item&&state.price?"check-btn on":"check-btn off"}" onclick="if(state.item&&state.price)analyze()">${state.item&&state.price?"Check the deal &#x2192;":"Enter item + price above"}</button>
    </div>
    ${cat.tips&&cat.tips.length>0?`<div class="chips-row">${cat.tips.map(t=>`<button class="chip" onclick="fillItem('${t.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}',true)">${t}</button>`).join("")}</div>`:""}
    <div class="examples-section">
      <div class="section-label">Quick Examples</div>
      <div class="ex-grid">${cat.examples.map((ex,i)=>`<div class="ex-card" onclick="fillEx(${i})"><div class="ex-name">${ex.label}</div><div class="ex-meta">${ex.price} · ${ex.store}</div></div>`).join("")}</div>
    </div>
    <div style="height:8px"></div>`;
}

function renderHistory(){
  const hc=state.history.length;
  return`
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between">
      <div><div class="page-title">History</div><div class="page-sub">${hc} item${hc!==1?"s":""} checked</div></div>
      ${hc>0?`<button class="clear-btn" onclick="clearHistory()">Clear all</button>`:""}
    </div>
    ${hc===0?`<div class="empty-state"><span class="empty-icon">&#x1F6CD;&#xFE0F;</span>No checks yet.<br>Go find something to buy.</div>`:
      state.history.map((h,i)=>{const hcat=CATS.find(c=>c.id===h.categoryId)||CATS[0];const vd=VERDICT[h.verdictKey];return`<div class="history-card" onclick="viewH(${i})"><div class="h-emoji-wrap" style="background:${vd.bg};border:1px solid ${vd.border}">${vd.emoji}</div><div class="h-info"><div class="h-name">${hcat.icon} ${h.item}</div><div class="h-meta">${h.price}${h.store?` · ${h.store}`:""} · ${h.time}</div></div><div class="h-verdict" style="color:${vd.color}">${vd.label}</div></div>`;}).join("")
    }
    <div style="height:8px"></div>`;
}

function renderCategories(){
  return`
    <div class="page-header"><div class="page-title">Categories</div><div class="page-sub">Pick your shopping category</div></div>
    ${CATEGORIES.map(c=>c.section
      ?`<div class="cat-section-label">${c.section}</div>`
      :`<div class="cat-row ${state.categoryId===c.id?"selected":""}" onclick="selectCatPage('${c.id}')"><div class="cat-icon-wrap">${c.icon}</div><span class="cat-name">${c.name}</span><span class="cat-check">&#x2713;</span></div>`
    ).join("")}
    <div style="height:8px"></div>`;
}

function selectCatPage(id){state.categoryId=id;state.item="";state.price="";state.store="";state.size="";saveCat(id);setState({tab:"home"});}

function render(){
  let body="";
  if(state.tab==="result"){
    body=state.loading
      ?`<div class="loading-screen"><div class="loading-logo">&#x1F50D;</div><div class="loading-item">${state.item}</div><div class="loading-step">${state.loadStep}</div><div class="loading-dots"><span></span><span></span><span></span></div></div>`
      :renderResult();
  }else if(state.tab==="history"){body=renderHistory();}
  else if(state.tab==="categories"){body=renderCategories();}
  else{body=renderHome();}

  const isResult=state.tab==="result";
  const topbarRight=isResult?`<button class="topbar-action" onclick="doReset()">&#x2190; Back</button>`:"";
  const showMenu=state.tab==="home"||state.tab==="categories"||state.tab==="result";

  document.getElementById("app").innerHTML=`
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        ${showMenu?`<button class="menubtn" onclick="openSidebar()">&#9776;</button>`:""}
        <div class="topbar-logo"><div class="logo-ring">&#x1F50D;</div>GoodDeal?</div>
      </div>
      ${topbarRight}
    </div>
    <div class="scroll-body">${body}</div>`;

  updateTabBar();
  buildSidebar();
  state._prevTab=state.tab;
}

function renderAc(){
  const recentItems=[...new Set(state.history.map(h=>h.item))].slice(0,5);
  const acItems=state.item?recentItems.filter(i=>i.toLowerCase().includes(state.item.toLowerCase())&&i!==state.item):[];
  const wrap=document.querySelector(".input-wrap");if(!wrap)return;
  const old=wrap.querySelector(".ac-drop");if(old)old.remove();
  if(!acItems.length)return;
  const div=document.createElement("div");div.className="ac-drop";
  div.innerHTML=acItems.map(i=>`<div class="ac-item" onclick="fillItem('${i.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">&#x1F550; ${i}<span class="ac-sub">recent</span></div>`).join("");
  wrap.appendChild(div);
}

function fillItem(val,focusPrice=false){state.item=val;const ii=document.getElementById("ii");if(ii)ii.value=val;setTimeout(()=>{const ac=document.querySelector(".ac-drop");if(ac)ac.remove();},150);upd();if(focusPrice){const ip=document.getElementById("ip");if(ip)ip.focus();}}
function fillEx(i){const e=getCat().examples[i];state.item=e.label;state.price=e.price;state.store=e.store;render();}
function doReset(){setState({tab:"home",result:null});}
function viewH(i){const h=state.history[i];state.item=h.item;state.price=h.price;state.store=h.store;state.size=h.size||"";state.categoryId=h.categoryId||"all";setState({tab:"result",result:h});}
function upd(){const b=document.getElementById("gb");if(!b)return;const on=state.item&&state.price;b.className=on?"check-btn on":"check-btn off";b.textContent=on?"Check the deal →":"Enter item + price above";}
function clearHistory(){state.history=[];saveHistory([]);render();}
function doShare(){
  const r=state.result;if(!r)return;
  const vd=VERDICT[r.verdictKey];const ol=pick(r.text,"ONE LINE");
  const ch=r.priceList?.[0]?`\nCheapest: ${r.priceList[0].source} at ${r.priceList[0].price}`:"";
  const coupons=pick(r.text,"COUPON TIPS");
  const t=`${vd.emoji} ${r.item} for ${r.price} — ${vd.label} (${r.score}/100)${ch}${ol?`\n\n"${ol}"`:""}${coupons?`\n\nCoupon tip: ${coupons.split(".")[0]}.`:""}\n\nChecked with GoodDeal?`;
  if(navigator.share){navigator.share({text:t}).catch(()=>{});}
  else navigator.clipboard?.writeText(t).then(()=>alert("Copied to clipboard!")).catch(()=>alert(t));
}

render();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
